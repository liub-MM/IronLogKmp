workflows:
  ios-simulator-build:
    name: iOS Simulator Build (for Appetize.io)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      java: 21
      xcode: latest
    scripts:
      - name: Create local.properties (API Key Mock)
        script: |
          echo "GEMINI_API_KEY=dummy_key_for_simulator" > local.properties

      - name: Generate Podfile and Install Firebase
        script: |
          cd iosApp
          
          cat <<EOF > Podfile
          platform :ios, '14.0'
          use_frameworks!
          
          target 'iosApp' do
            pod 'FirebaseCore'
            pod 'FirebaseAuth'
            pod 'FirebaseFirestore'
          end
          EOF
          
          pod install

      - name: Build iOS App for Simulator
        script: |
          chmod +x gradlew
          cd iosApp
          
          xcodebuild build \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ../build_ios

      - name: Package .app into .zip for Appetize.io
        script: |
          cd build_ios/Build/Products/Debug-iphonesimulator
          zip -r ../../../../IronLog_iOS_Simulator.zip *.app

    artifacts:
      - IronLog_iOS_Simulator.zip